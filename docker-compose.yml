version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - ./health/.env.docker

  health:
    build:
      context: ./health
      dockerfile: Dockerfile
    container_name: health_backend
    ports:
      - "8000:8000"
    volumes:
      - ./health:/app/health
    env_file:
      - ./health/.env
    environment:
      POSTGRES_HOST: db 
      POSTGRES_PORT: 5432
    depends_on:
      - db
   
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 project.wsgi:application"

  health_front:
    build:
      context: ./health_front
      dockerfile: Dockerfile
    container_name: health_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./health_front:/app/health_front
      - /app/health_front/node_modules 
    depends_on:
      - health 
    env_file:
      - ./health_front/.env

volumes:
  postgres_data:
